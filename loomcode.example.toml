# LoomCode CLI 示例配置
#
# 推荐位置：~/.loomcode/models.toml 或 ~/.loomcode/models.json
# 项目级也可使用：./models.toml 或 ./models.json
# 旧的 loomcode.toml / ~/.loomcode/loomcode.toml 仍兼容，但已弃用。
#
# 本文件可直接复制为 ~/.loomcode/models.toml 使用。

# 默认 Provider（可选，不填则使用第一个 provider）
default_provider = "deepseek"

# ============================================================
# Provider 定义
# ============================================================

[[providers]]
name         = "deepseek"
display_name = "DeepSeek"
kind         = "deepseek"
base_url     = "https://api.deepseek.com"
# 推荐使用 api_key_env，避免把密钥明文写入配置文件
api_key_env  = "DEEPSEEK_API_KEY"
# 也可以直接写 api_key（优先级高于 api_key_env）
# api_key = "sk-xxxxxxxxxxxxxxxx"
default_model = "deepseek-v4-flash"

  [[providers.models]]
  id             = "deepseek-v4-flash"
  name           = "DeepSeek V4 Flash"
  context_window = 131072

  [providers.models.cost]
  input        = 0.14
  cached_input = 0.014
  output       = 0.28

  [providers.models.capabilities]
  tool_call    = true
  prefix_cache = true

  [[providers.models]]
  id             = "deepseek-v4-pro"
  name           = "DeepSeek V4 Pro"
  context_window = 131072

  [providers.models.cost]
  input        = 0.55
  cached_input = 0.055
  output       = 2.19

  [providers.models.capabilities]
  reasoning   = true
  tool_call   = true
  prefix_cache = true

